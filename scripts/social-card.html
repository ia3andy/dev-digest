<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    margin: 0;
    padding: 0;
    background: #101828;
  }

  .card-bg {
    width: 1200px;
    height: 630px;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(ellipse 80% 60% at 20% 80%, rgba(201, 138, 92, 0.15) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(0, 188, 255, 0.12) 0%, transparent 70%),
      radial-gradient(ellipse 90% 70% at 50% 50%, rgba(54, 65, 83, 0.4) 0%, transparent 80%),
      #101828;
  }

  .content-card {
    position: absolute;
    top: 130px;
    left: 50%;
    transform: translateX(-50%);
    bottom: 50px;
    width: 820px;
    z-index: 4;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 36px 48px;
    align-items: center;
    text-align: center;
    background: rgba(30, 41, 57, 0.92);
    border: 1px solid rgba(54, 65, 83, 0.8);
    border-radius: 20px;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }

  .title {
    font-size: 86px;
    font-weight: 700;
    font-family: 'Fira Code', ui-monospace, monospace;
    letter-spacing: 2px;
    margin-bottom: 14px;
    background: linear-gradient(135deg, #e0a880 0%, #c98a5c 30%, #00bcff 60%, #e0a880 80%, #c98a5c 100%);
    background-size: 300% 300%;
    background-position: 0% 50%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .tagline {
    font-size: 30px;
    font-weight: 600;
    font-family: 'Fira Code', ui-monospace, monospace;
    color: #00bcff;
    margin-bottom: 16px;
    line-height: 1.3;
  }

  .description {
    font-size: 22px;
    font-family: 'Fira Code', ui-monospace, monospace;
    color: #99a1af;
    line-height: 1.5;
    max-width: 520px;
  }

  .oss {
    margin-top: 20px;
    font-size: 15px;
    font-family: 'Fira Code', ui-monospace, monospace;
    font-weight: 600;
    color: #c98a5c;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .accent-lines-bg {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 0;
    justify-content: space-between;
    z-index: 1;
    padding: 0;
  }

  .accent-lines-bg .line {
    width: 2px;
    border-radius: 2px;
    background: linear-gradient(to top, #c98a5c, #00bcff);
    flex-shrink: 0;
  }

  .mascot-wrapper {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
  }

  .mascot {
    display: block;
    width: 300px;
    height: auto;
    filter: drop-shadow(0 4px 20px rgba(0, 0, 0, 0.4));
  }
</style>
</head>
<body>
<div class="card-bg">
  <div class="content-card">
    <div class="title">Devoured</div>
    <div class="tagline">Daily developer news, AI-curated</div>
    <div class="description">A condensed daily developer news digest, summarized by Claude. Free and open source.</div>
    <div class="oss">Free &amp; Open Source</div>
  </div>

  <div class="accent-lines-bg" id="lines"></div>

  <div class="mascot-wrapper">
    <img class="mascot" src="mascot.svg" />
  </div>
</div>
<script>
  function seededRandom(seed) {
    return function() {
      seed = (seed * 16807 + 0) % 2147483647;
      return seed / 2147483647;
    };
  }
  const rand = seededRandom(42);
  const container = document.getElementById('lines');
  const count = 80;
  for (let i = 0; i < count; i++) {
    const line = document.createElement('div');
    line.className = 'line';
    const h = 80 + rand() * 450;
    const o = 0.04 + rand() * 0.18;
    line.style.height = h + 'px';
    line.style.opacity = o;
    container.appendChild(line);
  }
</script>
</body>
</html>
